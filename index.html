<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>WebPOS V3 — Dashboard</title>

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<!-- CSS Variables Tema -->
<style>
  :root {
    --primary: #10b981; --primary-light: #34d399; --primary-dark: #059669;
    --bg: #f0fdf4; --surface: #ffffff; --text: #1f2937;
    --text-secondary: #6b7280; --border: #d1fae5;
    --shadow: 0 10px 40px rgba(16,185,129,0.12);
    --radius: 16px; --font: 'Segoe UI', system-ui, sans-serif;
  }

  * { margin:0; padding:0; box-sizing:border-box; font-family: var(--font); }
  body { background: var(--bg); color: var(--text); min-height: 100vh; }

  /* ===== SIDEBAR ===== */
  #sidebar {
    position: fixed; top:0; left:0; width: 260px; height: 100vh;
    background: var(--surface); border-right: 1px solid var(--border);
    transform: translateX(-100%); transition: transform 0.3s ease;
    z-index: 1000; display: flex; flex-direction: column;
    box-shadow: var(--shadow);
  }
  #sidebar.open { transform: translateX(0); }
  .sidebar-header { padding: 24px 20px; border-bottom: 1px solid var(--border); }
  .sidebar-logo { font-size: 20px; font-weight: 800; color: var(--primary-dark); }
  .sidebar-menu { list-style: none; padding: 12px 0; flex: 1; overflow-y: auto; }
  .sidebar-menu li a {
    display: flex; align-items: center; gap: 12px;
    padding: 12px 20px; color: var(--text); text-decoration: none;
    font-size: 15px; font-weight: 500; transition: all 0.2s;
    border-left: 3px solid transparent;
  }
  .sidebar-menu li a:hover, .sidebar-menu li a.active {
    background: linear-gradient(90deg, var(--bg), transparent);
    border-left-color: var(--primary);
    color: var(--primary-dark);
  }
  .sidebar-menu .icon { font-size: 18px; width: 24px; text-align: center; }
  .sidebar-footer { padding: 16px 20px; border-top: 1px solid var(--border); }
  .sidebar-footer button {
    width: 100%; padding: 10px; border: 1px solid var(--border);
    background: transparent; color: var(--text-secondary);
    border-radius: 10px; cursor: pointer; font-size: 14px;
  }
  .sidebar-footer button:hover { background: var(--bg); color: var(--text); }

  /* ===== OVERLAY ===== */
  #sidebarOverlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.4);
    opacity: 0; pointer-events: none; transition: opacity 0.3s;
    z-index: 999;
  }
  #sidebarOverlay.show { opacity: 1; pointer-events: all; }

  /* ===== TOPBAR ===== */
  .topbar {
    position: sticky; top:0; z-index: 100;
    background: var(--surface); border-bottom: 1px solid var(--border);
    padding: 14px 20px; display: flex; align-items: center; justify-content: space-between;
  }
  .burger { font-size: 24px; cursor: pointer; background: none; border: none; }
  .topbar-title { font-size: 18px; font-weight: 700; }
  .topbar-actions { display: flex; gap: 10px; align-items: center; }
  .topbar-actions button {
    background: none; border: none; font-size: 20px; cursor: pointer;
    padding: 6px; border-radius: 8px;
  }
  .topbar-actions button:hover { background: var(--bg); }

  /* ===== MAIN CONTENT ===== */
  .main {
    margin-left: 0; padding: 20px; max-width: 1200px;
  }
  @media (min-width: 1024px) {
    #sidebar { transform: translateX(0); width: 260px; }
    .main { margin-left: 260px; }
    .burger { display: none; }
    #sidebarOverlay { display: none; }
  }

  /* ===== STATS CARD ===== */
  .stats-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 14px; margin-bottom: 24px;
  }
  @media (min-width: 640px) {
    .stats-grid { grid-template-columns: repeat(4, 1fr); }
  }
  .stat-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 18px 16px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.04);
    transition: transform 0.2s;
  }
  .stat-card:active { transform: scale(0.98); }
  .stat-icon {
    width: 40px; height: 40px; border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px; margin-bottom: 10px;
  }
  .stat-label { font-size: 12px; color: var(--text-secondary); font-weight: 600; text-transform: uppercase; }
  .stat-value { font-size: 20px; font-weight: 800; color: var(--text); margin-top: 4px; }
  .stat-change { font-size: 12px; color: var(--primary-dark); margin-top: 4px; font-weight: 600; }

  /* ===== SECTION ===== */
  .section {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 20px; margin-bottom: 20px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.04);
  }
  .section-title {
    font-size: 16px; font-weight: 700; margin-bottom: 14px;
    display: flex; align-items: center; gap: 8px;
  }

  /* ===== TABLE ===== */
  .data-table { width: 100%; border-collapse: collapse; font-size: 14px; }
  .data-table th {
    text-align: left; padding: 10px 12px; color: var(--text-secondary);
    font-weight: 600; font-size: 12px; text-transform: uppercase;
    border-bottom: 2px solid var(--border);
  }
  .data-table td { padding: 12px; border-bottom: 1px solid var(--border); }
  .data-table tr:last-child td { border-bottom: none; }

  /* ===== BADGE ===== */
  .badge {
    display: inline-block; padding: 4px 10px; border-radius: 20px;
    font-size: 12px; font-weight: 600;
  }
  .badge-green { background: #d1fae5; color: #065f46; }
  .badge-red   { background: #fee2e2; color: #991b1b; }
  .badge-blue  { background: #dbeafe; color: #1e40af; }

  /* ===== LOADING ===== */
  .skeleton {
    background: linear-gradient(90deg, var(--border) 25%, #e5e7eb 50%, var(--border) 75%);
    background-size: 200% 100%; animation: shimmer 1.5s infinite;
    border-radius: 8px; height: 16px; margin-bottom: 8px;
  }
  @keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }

  .toast {
    position: fixed; top: 20px; left: 50%;
    transform: translateX(-50%) translateY(-100px);
    background: #1f2937; color: #fff; padding: 14px 24px;
    border-radius: 12px; font-size: 14px; font-weight: 500;
    box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    transition: transform 0.4s cubic-bezier(0.175,0.885,0.32,1.275);
    z-index: 9999; max-width: 90%; text-align: center;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<!-- Sidebar -->
<div id="sidebar"></div>
<div id="sidebarOverlay"></div>

<!-- Topbar -->
<div class="topbar">
  <button class="burger" id="burgerMenu">☰</button>
  <div class="topbar-title">Dashboard</div>
  <div class="topbar-actions">
    <button onclick="THEME.toggleDark()" title="Dark Mode">🌓</button>
    <span id="userName" style="font-size:13px;font-weight:600;color:var(--text-secondary);"></span>
  </div>
</div>

<!-- Main -->
<div class="main">

  <!-- STAT CARDS -->
  <div class="stats-grid" id="statsGrid">
    <div class="stat-card">
      <div class="stat-icon" style="background:#d1fae5;">💰</div>
      <div class="stat-label">Penjualan Hari Ini</div>
      <div class="stat-value" id="statPenjualan"><div class="skeleton" style="width:80%"></div></div>
    </div>
    <div class="stat-card">
      <div class="stat-icon" style="background:#dbeafe;">🛒</div>
      <div class="stat-label">Jumlah Transaksi</div>
      <div class="stat-value" id="statTransaksi"><div class="skeleton" style="width:60%"></div></div>
    </div>
    <div class="stat-card">
      <div class="stat-icon" style="background:#fef3c7;">🏦</div>
      <div class="stat-label">Saldo Kas</div>
      <div class="stat-value" id="statSaldo"><div class="skeleton" style="width:70%"></div></div>
    </div>
    <div class="stat-card">
      <div class="stat-icon" style="background:#fee2e2;">🤝</div>
      <div class="stat-label">Piutang Belum Lunas</div>
      <div class="stat-value" id="statHutang"><div class="skeleton" style="width:50%"></div></div>
    </div>
  </div>

  <!-- TRANSAKSI TERBARU -->
  <div class="section">
    <div class="section-title">📋 Transaksi Terbaru</div>
    <div style="overflow-x:auto;">
      <table class="data-table" id="tableTransaksi">
        <thead>
          <tr><th>Waktu</th><th>Kasir</th><th>Total</th><th>Metode</th><th>Status</th></tr>
        </thead>
        <tbody id="tbodyTransaksi">
          <tr><td colspan="5" style="text-align:center;color:var(--text-secondary);padding:24px;">Memuat data...</td></tr>
        </tbody>
      </table>
    </div>
  </div>

  <!-- KAS TERBARU -->
  <div class="section">
    <div class="section-title">💳 Riwayat Kas Terbaru</div>
    <div style="overflow-x:auto;">
      <table class="data-table" id="tableKas">
        <thead>
          <tr><th>Waktu</th><th>Jenis</th><th>Jumlah</th><th>Keterangan</th></tr>
        </thead>
        <tbody id="tbodyKas">
          <tr><td colspan="4" style="text-align:center;color:var(--text-secondary);padding:24px;">Memuat data...</td></tr>
        </tbody>
      </table>
    </div>
  </div>

</div>

<div class="toast" id="toast"></div>

<!-- Load Modules -->
<script src="js/modules/firebase-config.js"></script>
<script src="js/modules/auth.js"></script>
<script src="js/modules/utils.js"></script>

<script>
/**
 * index.html — DASHBOARD
 * FUNGSI: Tampilkan ringkasan data dari:
 *   - /transaksi/     → Total penjualan & jumlah transaksi hari ini
 *   - /transaksi_kas/ → Hitung saldo kas (masuk - keluar - tarik + topup)
 *   - /hutang/        → Total piutang dengan status "belum_lunas"
 *   - /users/         → Nama kasir untuk ditampilkan di tabel
 * DEPENDENSI: firebase-config.js, auth.js, utils.js
 * CATATAN: Semua data diambil sekali saat load. Untuk real-time, gunakan .on('value')
 */

// 1. Cek login
if (!AUTH.requireAuth()) {
  // Sudah redirect ke login di dalam requireAuth()
  throw new Error("Belum login");
}

// 2. Init tema & sidebar
THEME.init();
NAV.renderSidebar('index');
NAV.initMobileMenu();

// 3. Tampilkan nama user
const session = AUTH.getSession();
document.getElementById('userName').textContent = session.nama_lengkap;

// 4. Helper toast
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

// 5. Hitung hari ini (00:00 - 23:59)
const now = new Date();
const startHariIni = new Date(now.getFullYear(), now.getMonth(), now.getDate()).getTime();
const endHariIni = startHariIni + (24 * 60 * 60 * 1000) - 1;

// 6. Ambil & Render Data Dashboard
async function loadDashboard() {
  try {
    // === AMBIL DATA PARALEL ===
    const [allTransaksi, allKas, allHutang, allUsers] = await Promise.all([
      DB_TRANSAKSI.getAll(),
      DB_TRANSAKSI_KAS.getAll(),
      DB_HUTANG.getAll(),
      DB_USERS.getAll ? DB_USERS.getAll() : Promise.resolve({})
    ]);

    // === HITUNG PENJUALAN HARI INI ===
    let totalPenjualan = 0;
    let jumlahTransaksi = 0;
    const transaksiHariIni = [];

    Object.keys(allTransaksi).forEach(key => {
      const t = allTransaksi[key];
      if (t.waktu >= startHariIni && t.waktu <= endHariIni) {
        totalPenjualan += Number(t.total || 0);
        jumlahTransaksi++;
        transaksiHariIni.push({ id: key, ...t });
      }
    });

    // Sort terbaru
    transaksiHariIni.sort((a, b) => b.waktu - a.waktu);

    // === HITUNG SALDO KAS ===
    let saldoKas = 0;
    const kasTerbaru = [];

    Object.keys(allKas).forEach(key => {
      const k = allKas[key];
      const jumlah = Number(k.jumlah || 0);
      if (k.jenis === 'masuk' || k.jenis === 'topup') saldoKas += jumlah;
      if (k.jenis === 'keluar' || k.jenis === 'tarik') saldoKas -= jumlah;
      if (k.jenis === 'shift' && k.arah === 'masuk') saldoKas += jumlah;
      if (k.jenis === 'shift' && k.arah === 'keluar') saldoKas -= jumlah;
      kasTerbaru.push({ id: key, ...k });
    });

    kasTerbaru.sort((a, b) => b.waktu - a.waktu);

    // === HITUNG PIUTANG ===
    let totalHutang = 0;
    Object.keys(allHutang).forEach(key => {
      const h = allHutang[key];
      if (h.status === 'belum_lunas') {
        totalHutang += Number(h.sisa || h.jumlah || 0);
      }
    });

    // === RENDER STAT CARD ===
    document.getElementById('statPenjualan').textContent = UTILS.formatRupiah(totalPenjualan);
    document.getElementById('statTransaksi').textContent = jumlahTransaksi + ' trx';
    document.getElementById('statSaldo').textContent = UTILS.formatRupiah(saldoKas);
    document.getElementById('statHutang').textContent = UTILS.formatRupiah(totalHutang);

    // === RENDER TABEL TRANSAKSI (max 10) ===
    const tbodyTrx = document.getElementById('tbodyTransaksi');
    if (transaksiHariIni.length === 0) {
      tbodyTrx.innerHTML = '<tr><td colspan="5" style="text-align:center;color:var(--text-secondary);padding:24px;">Belum ada transaksi hari ini</td></tr>';
    } else {
      tbodyTrx.innerHTML = transaksiHariIni.slice(0, 10).map(t => {
        const kasirName = (allUsers && allUsers[t.kasir_uid]) ? allUsers[t.kasir_uid].nama_lengkap : 'Kasir';
        const badge = t.metode_bayar === 'tunai' ? '<span class="badge badge-green">Tunai</span>' :
                      t.metode_bayar === 'transfer' ? '<span class="badge badge-blue">Transfer</span>' :
                      '<span class="badge badge-red">Hutang</span>';
        return `<tr>
          <td>${UTILS.formatDateTime(t.waktu)}</td>
          <td>${kasirName}</td>
          <td style="font-weight:700;">${UTILS.formatRupiah(t.total)}</td>
          <td>${badge}</td>
          <td><span class="badge badge-green">Sukses</span></td>
        </tr>`;
      }).join('');
    }

    // === RENDER TABEL KAS (max 10) ===
    const tbodyKas = document.getElementById('tbodyKas');
    if (kasTerbaru.length === 0) {
      tbodyKas.innerHTML = '<tr><td colspan="4" style="text-align:center;color:var(--text-secondary);padding:24px;">Belum ada data kas</td></tr>';
    } else {
      tbodyKas.innerHTML = kasTerbaru.slice(0, 10).map(k => {
        const jenisLabel = { masuk:'📥 Masuk', keluar:'📤 Keluar', tarik:'🏧 Tarik', topup:'💳 Top Up', shift:'🔄 Shift' };
        const jenisBadge = k.jenis === 'masuk' || k.jenis === 'topup' ? 'badge-green' : 'badge-red';
        return `<tr>
          <td>${UTILS.formatDateTime(k.waktu)}</td>
          <td><span class="badge ${jenisBadge}">${jenisLabel[k.jenis] || k.jenis}</span></td>
          <td style="font-weight:700;">${UTILS.formatRupiah(k.jumlah)}</td>
          <td>${k.keterangan || '-'}</td>
        </tr>`;
      }).join('');
    }

  } catch (err) {
    console.error("[DASHBOARD] Load error:", err);
    showToast("Gagal memuat data dashboard. Cek koneksi internet.");
  }
}

// 7. Jalankan load
loadDashboard();

// 8. Auto refresh setiap 60 detik (opsional)
setInterval(loadDashboard, 60000);
</script>

</body>
</html>
